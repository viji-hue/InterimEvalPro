scenario:`A network topology map is represented as a grid where '1' = active node and '0' = disconnected node. Connected active nodes (horizontally/vertically adjacent) form a "cluster". Write <code>countClusters(char[][] grid)</code> that returns the number of independent clusters.`,
task:`Implement <code>countClusters(char[][] grid)</code> using DFS`,
sampleInput:`grid = [['1','1','0'],['0','1','0'],['0','0','1']]`,sampleOutput:`2`,
sampleInput2:`grid = [['1','1'],['1','1']]`,sampleOutput2:`1`,
tc:[{i:"[[1,1,0],[0,1,0],[0,0,1]]",e:"2",v:true},{i:"[[1,1],[1,1]]",e:"1",v:true},{i:"[[1,0],[0,1]]",e:"2",v:false}],
code:`public class Solution {
    public int countClusters(char[][] grid) {
        if (grid == null || grid.length == 0) return 0;
        int count = 0;
        // Loop: when cell=='1', increment count, then DFS to mark all connected '1's as '0'
        
        return count;
    }
    
    private void dfs(char[][] grid, int r, int c) {
        if (r < 0 || r >= grid.length || c < 0 || c >= grid[0].length || grid[r][c] != '1') return;
        grid[r][c] = '0';
        dfs(grid, r+1, c); dfs(grid, r-1, c); dfs(grid, r, c+1); dfs(grid, r, c-1);
    }
}`,hint:"for(i) for(j) if(grid[i][j]=='1') { count++; dfs(grid,i,j); } The DFS helper marks visited nodes."},

async function storeSet(key,val){
  try{
    if(typeof window.storage!=="undefined") await window.storage.set(key,JSON.stringify(val),true);
    else{const m=JSON.parse(localStorage.getItem("qb_java")||"{}");m[key]=val;localStorage.setItem("qb_java",JSON.stringify(m));}
  }catch(e){console.warn("storeSet:",e);}
}
async function storeGet(key){
  try{
    if(typeof window.storage!=="undefined"){const r=await window.storage.get(key,true);return r?JSON.parse(r.value):null;}
    else{const m=JSON.parse(localStorage.getItem("qb_java")||"{}");return m[key]??null;}
  }catch{return null;}
}
async function storeList(prefix){
  try{
    if(typeof window.storage!=="undefined"){const r=await window.storage.list(prefix,true);return r?.keys||[];}
    else{const m=JSON.parse(localStorage.getItem("qb_java")||"{}");return Object.keys(m).filter(k=>k.startsWith(prefix));}
  }catch{return[];}
}

async function callAPI(prompt,maxT=3000){
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxT,messages:[{role:"user",content:prompt}]})
  });
  return (await r.json()).content.map(c=>c.text||"").join("");
}

async function evaluateOne(q,code){
  const tcStr=q.tc.map((t,i)=>`TC${i+1}[visible:${t.v}]: input=${t.i}, expected="${t.e}"`).join("\n");
  const raw=await callAPI(
    `Evaluate this Java code for the problem "${q.title}".\n\nProblem: ${q.task}\n${q.scenario.replace(/<[^>]+>/g,"")}\n\nStudent Code:\n${code}\n\nTest Cases:\n${tcStr}\n\nTrace execution for each test case.\nReturn ONLY valid JSON:\n{"compileError":false,"compileMessage":"","results":[{"tc":1,"input":"...","expected":"...","actual":"...","passed":true,"visible":true,"explanation":"Why."}],"overallScore":80,"feedback":"2-3 sentences on solution quality and improvement."}`,
    3500
  );
  return JSON.parse(raw.replace(/```json|```/g,"").trim());
}

async function evaluateAll(){
  if(session.submitting) return;
  session.submitting=true;
  session.submitted=false;
  render();
  const qs=session.questions;
  for(let i=0;i<qs.length;i++){
    const q=qs[i];
    const cm=editors[q.id];
    const code=cm?cm.getValue():(session.results[q.id]?.code||q.code);
    session.results[q.id]={running:true,code};
    // update sidebar badge
    updateSidebarItem(i,"running");
    try{
      const ev=await evaluateOne(q,code);
      const passed=(ev.results||[]).filter(r=>r.passed).length;
      const total=(ev.results||[]).length;
      session.results[q.id]={
        code,running:false,
        compileError:ev.compileError||false,
        compileMessage:ev.compileMessage||"",
        tcResults:ev.results||[],
        overallScore:ev.overallScore||0,
        feedback:ev.feedback||"",
        passed,total,
        status:(!ev.compileError&&passed===total)?"pass":passed>0?"partial":"fail"
      };
    }catch(e){
      session.results[q.id]={code,running:false,compileError:true,compileMessage:"Evaluation error: "+e.message,tcResults:[],status:"fail",passed:0,total:q.tc.length};
    }
    updateSidebarItem(i,session.results[q.id].status);
  }
  session.submitting=false;
  session.submitted=true;
  // ── Save to shared storage for trainer dashboard ──
  try{
    const qs=session.questions;
    const totalScore=Math.round(qs.reduce((s,q)=>{const r=session.results[q.id];return s+(r?.overallScore||0);},0)/qs.length);
    const record={
      studentId:session.form.id, studentName:session.form.name, batch:session.form.batch,
      date:new Date().toISOString(), totalScore,
      passed:qs.filter(q=>session.results[q.id]?.status==="pass").length,
      partial:qs.filter(q=>session.results[q.id]?.status==="partial").length,
      questions:qs.map(q=>({
        id:q.id, title:q.title, topic:q.topic, diff:q.diff,
        code:session.results[q.id]?.code||"",
        tcResults:session.results[q.id]?.tcResults||[],
        overallScore:session.results[q.id]?.overallScore||0,
        feedback:session.results[q.id]?.feedback||"",
        compileError:session.results[q.id]?.compileError||false,
        compileMessage:session.results[q.id]?.compileMessage||"",
        status:session.results[q.id]?.status||"fail",
        passed:session.results[q.id]?.passed||0,
        total:session.results[q.id]?.total||0
      }))
    };
    const key=`java:${Date.now()}:${session.form.id.replace(/[\s\/\\'\"]/g,'_')}`;
    await storeSet(key,record);
  }catch(e){console.warn("save:",e);}
  render();
}

function updateSidebarItem(qi,status){
  const el=document.querySelector(`[data-qi="${qi}"]`);
  if(!el)return;
  el.classList.remove("done-pass","done-fail","done-partial","active");
  if(session.current===qi)el.classList.add("active");
  if(status==="running"){el.style.opacity="0.7";}
  else{el.style.opacity="1";
    if(status==="pass")el.classList.add("done-pass");
    else if(status==="partial")el.classList.add("done-partial");
    else if(status==="fail")el.classList.add("done-fail");
  }
  const dot=el.querySelector(".status-dot");
  if(dot){dot.className="status-dot "+(status==="pass"?"dot-green":status==="partial"?"dot-orange":status==="fail"?"dot-red":"dot-gray");}
}

function render(){
  const root=document.getElementById("root");
  if(!root) return;
  // Before any re-render of the quiz screen, save code from all live editors
  // and delete the stale references so initEditor recreates them fresh
  session.questions.forEach(q=>{
    if(editors[q.id]){
      const code=editors[q.id].getValue();
      if(session.results[q.id]) session.results[q.id].code=code;
      else session.results[q.id]={code};
      delete editors[q.id];
    }
  });
  if(S.screen==="trainer"){
    root.innerHTML=T.selected?renderStudentDetail(T.selected):renderTrainer();
    bindEvents();
    return;
  }
  if(S.screen==="login"){
    root.innerHTML=renderLogin();
    bindEvents();
  } else if(S.screen==="quiz"){
    if(!session.submitted){ root.innerHTML=renderQuiz(); bindEvents(); setTimeout(initEditor,30); }
    else { root.innerHTML=renderFinalReport(); bindEvents(); }
  }
}

  try{
    const keys=await storeList("java:");
    const all=[];
    for(const k of keys){const r=await storeGet(k);if(r)all.push(r);}
    T.submissions=all.sort((a,b)=>new Date(b.date)-new Date(a.date));
  }catch(e){console.error(e);}
  T.loading=false; render();
}

}

/* ═══════════════════════════════════════════
   CODEMIRROR INIT
═══════════════════════════════════════════ */
function initEditor(){
  const q=session.questions[session.current];
  const wrap=document.getElementById("editor-wrap");
  if(!wrap) return;
  // Guard: if CodeMirror already exists in this DOM subtree, skip
  if(wrap.querySelector(".CodeMirror")) return;
  const ta=document.getElementById("cm-editor");
  if(!ta) return;
  const cm=CodeMirror.fromTextArea(ta,{
    mode:"text/x-java",theme:"eclipse",lineNumbers:true,
    autoCloseBrackets:true,matchBrackets:true,
    indentUnit:4,tabSize:4,indentWithTabs:false,
    extraKeys:{
      "Ctrl-Enter":()=>runOne(),
      "Tab":cm=>{cm.replaceSelection("    ");}
    }
  });
  cm.getWrapperElement().style.height="100%";
  cm.getWrapperElement().style.fontSize="13.5px";
  editors[q.id]=cm;
  setTimeout(()=>cm.refresh(),80);
}

/* ═══════════════════════════════════════════
   RUN ONE
═══════════════════════════════════════════ */
async function runOne(){
  const q=session.questions[session.current];
  const cm=editors[q.id];
  if(!cm||session.submitting) return;
  const code=cm.getValue();
  // Mark as running (render will save+clear the editor, then rebuild it)
  session.results[q.id]={code,running:true,status:null};
  document.getElementById("btn-run-one").disabled=true;
  document.getElementById("btn-run-one").textContent="⏳ Running...";
  try{
    const ev=await evaluateOne(q,code);
    const passed=(ev.results||[]).filter(r=>r.passed).length;
    const total=(ev.results||[]).length;
    session.results[q.id]={
      code,running:false,
      compileError:ev.compileError||false,
      compileMessage:ev.compileMessage||"",
      tcResults:ev.results||[],
      overallScore:ev.overallScore||0,
      feedback:ev.feedback||"",
      passed,total,
      status:(!ev.compileError&&passed===total)?"pass":passed>0?"partial":"fail"
    };
  }catch(e){
    session.results[q.id]={code,running:false,compileError:true,compileMessage:"Error: "+e.message,tcResults:[],status:"fail",passed:0,total:q.tc.length};
  }
  render(); // render() saves editor value, clears ref, rebuilds DOM, calls initEditor
}

/* ═══════════════════════════════════════════
   EVENT BINDING
═══════════════════════════════════════════ */
function bindEvents(){
  const $=id=>document.getElementById(id);
  const on=(id,ev,fn)=>{const el=$(id);if(el)el.addEventListener(ev,fn);};

  if(S.screen==="login"){
    const sync=()=>{session.form={id:$("f-id")?.value||"",name:$("f-name")?.value||"",batch:$("f-batch")?.value||""};};
    ["f-id","f-name","f-batch"].forEach(id=>on(id,"input",sync));
    ["f-id","f-name","f-batch"].forEach(id=>on(id,"keydown",e=>{if(e.key==="Enter"){sync();startSession();}}));
    on("btn-start","click",()=>{sync();startSession();});
  }

  if(S.screen==="quiz"){
    on("btn-exit","click",()=>{editors={};set({screen:"login",err:""});});
    on("btn-new-session","click",newSession);
    on("btn-run-one","click",runOne);
    on("btn-submit-all","click",evaluateAll);
    on("btn-fix-retry","click",()=>{
      // Keep code, clear result so student can edit and run again
      const q=session.questions[session.current];
      const savedCode=session.results[q.id]?.code||q.code;
      delete session.results[q.id];
      // Put code back so render picks it up via qRes?.code
      session.results[q.id]={code:savedCode};
      render();
    });
    on("btn-reset","click",()=>{
      const q=session.questions[session.current];
      delete session.results[q.id];
      render(); // render() will use q.code as fallback in textarea
    });
    document.querySelectorAll("[data-qi]").forEach(el=>{
      el.addEventListener("click",()=>{
        const qi=parseInt(el.getAttribute("data-qi"));
        if(qi===session.current) return;
        const cq=session.questions[session.current];
        if(editors[cq.id]&&session.results[cq.id]) session.results[cq.id].code=editors[cq.id].getValue();
        session.current=qi;
        render();
      });
    });
  }

  if(S.screen==="trainer"){
    on("btn-tr-refresh","click",()=>loadTrainer());
    on("btn-tr-exit","click",()=>{window.location.hash="";set({screen:"login"});});
    on("btn-back-tr","click",()=>tset({selected:null}));
    on("btn-back-tr2","click",()=>tset({selected:null}));
    const bSel=document.getElementById("tr-batch");
    const tSel=document.getElementById("tr-topic");
    if(bSel) bSel.addEventListener("change",e=>tset({batchFilter:e.target.value}));
    if(tSel) tSel.addEventListener("change",e=>tset({topicFilter:e.target.value}));
    const tbody=document.getElementById("tr-rows");
    if(tbody) tbody.addEventListener("click",e=>{
      const tr=e.target.closest("tr[data-si]");
      if(!tr) return;
      const idx=parseInt(tr.getAttribute("data-si"));
      const fSubs=(T.batchFilter==="all"?T.submissions:T.submissions.filter(s=>s.batch===T.batchFilter))
                  .filter(s=>T.topicFilter==="all"||s.questions.some(q=>q.topic===T.topicFilter));
      tset({selected:fSubs[idx]||null});
    });
  }
}

function startSession(){
  const f=session.form;
  if(!f.id.trim()){set({err:"Student ID is required."});return;}
  // Trainer access — enter "viji_tr" as Student ID
  if(f.id.trim().toLowerCase()==="viji_tr"){loadTrainer();return;}
  if(!f.name.trim()){set({err:"Full Name is required."});return;}
  if(!f.batch.trim()){set({err:"Batch ID is required."});return;}
  newSession();
}

function newSession(){
  editors={};
  session.results={};session.current=0;session.submitted=false;session.submitting=false;
  session.questions=shuffle(QB).slice(0,5);
  set({screen:"quiz",err:""});
}

  const batches=[...new Set(subs.map(s=>s.batch))].filter(Boolean);
  const allTopics=[...new Set(subs.flatMap(s=>s.questions.map(q=>q.topic)))].sort();

  const total=fSubs.length;
  const avgScore=total?Math.round(fSubs.reduce((s,r)=>s+r.totalScore,0)/total):0;

        <pre style="max-height:220px;overflow-y:auto;font-size:12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 12px;">${h(q.code||"(no code submitted)")}</pre></div>
        ${tcRows?`<div style="margin-bottom:10px;"><div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.06em;margin-bottom:5px;">TEST CASE RESULTS (${q.passed}/${q.total} passed)</div>${tcRows}</div>`:""}
        ${q.feedback?`<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 12px;"><div style="font-size:10px;font-weight:700;color:#1d4ed8;margin-bottom:4px;">AI FEEDBACK</div><div style="font-size:12px;color:#1e3a8a;line-height:1.65;">${h(q.feedback)}</div></div>`:""}
      </div>
    </div>`;
  }).join("");
  return `<div style="min-height:100vh;background:#f0f2f8;display:flex;flex-direction:column;">
  <div style="background:#1d4ed8;padding:0.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;">
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="background:rgba(255,255,255,0.2);color:#fff;border-radius:5px;padding:1px 8px;font-size:12px;font-weight:700;">QB</div>
      <span style="color:#fff;font-size:14px;font-weight:600;">Student Report — ${h(s.studentName)}</span>
    </div>
    <button id="btn-back-tr" style="background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);border-radius:6px;padding:5px 12px;font-size:12px;">← Back to Dashboard</button>
  </div>
  <div style="max-width:820px;margin:0 auto;padding:1.25rem;width:100%;">
    <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 12px rgba(30,64,175,0.06);">
      <div style="display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap;">
        <div style="width:76px;height:76px;border-radius:50%;background:${gc}15;border:3px solid ${gc};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
          <span style="font-size:20px;font-weight:700;color:${gc};line-height:1;">${g}</span><span style="font-size:11px;color:${gc};">${s.totalScore}%</span>
        </div>
        <div style="flex:1;min-width:160px;">
          <div style="font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:2px;">${h(s.studentName)}</div>
          <div style="font-size:13px;color:#64748b;">ID: ${h(s.studentId)} · Batch: ${h(s.batch)}</div>
          <div style="font-size:12px;color:#94a3b8;margin-top:1px;">${new Date(s.date).toLocaleString()}</div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
            <span style="background:#f0fdf4;color:#15803d;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;">✓ ${s.passed} Fully Passed</span>
            ${s.partial?`<span style="background:#fffbeb;color:#d97706;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;">⚡ ${s.partial} Partial</span>`:""}
            <span style="background:${s.totalScore>=60?"#eff6ff":"#fef2f2"};color:${gc};border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;">${s.totalScore>=60?"✓ PASS":"✗ NEEDS WORK"}</span>
          </div>
        </div>
        <div style="min-width:200px;"><div style="font-size:10px;font-weight:700;color:#94a3b8;letter-spacing:0.06em;margin-bottom:6px;">Q SCORES</div>
        <div style="display:flex;gap:4px;">${s.questions.map((q,i)=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;"><div style="height:30px;width:100%;background:${pctColor(q.overallScore)};border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;">${q.overallScore}%</div><div style="font-size:9px;color:#64748b;">Q${i+1}</div></div>`).join("")}</div></div>
      </div>
      ${s.questions.some(q=>q.overallScore<50)?`<div style="margin-top:1rem;padding:0.75rem;background:#fef2f2;border-radius:8px;border:1px solid #fca5a5;"><div style="font-size:11px;font-weight:700;color:#991b1b;margin-bottom:5px;">⚠ AREAS NEEDING FOCUS</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${s.questions.filter(q=>q.overallScore<50).map(q=>`<span style="background:#fff;border:1px solid #fca5a5;color:#991b1b;border-radius:20px;padding:2px 10px;font-size:11px;">${h(q.title)} (${q.overallScore}%)</span>`).join("")}</div></div>`:""}
    </div>
    <div style="font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:0.06em;margin-bottom:0.75rem;">QUESTION-BY-QUESTION — CODE, TEST RESULTS & FEEDBACK</div>
    ${qCards}
    <div style="text-align:center;padding-bottom:1.5rem;">
      <button id="btn-back-tr2" style="background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:10px 2rem;font-size:14px;font-weight:600;">← Back to Dashboard</button>
    </div>
  </div>
</div>`;
}

/* ── BOOT ── */
render();
</script>
</body>
</html>
